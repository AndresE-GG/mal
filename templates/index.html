<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Anime MAL</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <!-- Estilos locales -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <header class="header">
            <h1 class="title">Buscador de <span class="accent">Anime</span></h1>
            <p class="subtitle">Busca animes que inicien con el texto que prefieras.</p>
        </header>

        <main>
            <form id="search-form" class="search-bar">
                <input type="text" id="search-input" placeholder="Ingresa una letra (ej. A)" maxlength="30"
                    autocomplete="off" required>
                <button type="submit" class="search-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </form>

            <div id="loading" class="hidden">
                <div class="spinner"></div>
            </div>

            <div id="error-message" class="hidden error"></div>

            <div id="results-grid" class="grid hidden">
                <!-- Los resultados se generarán aquí con Javascript -->
            </div>
        </main>
    </div>

    <script>
        document.getElementById('search-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const inputVal = document.getElementById('search-input').value.trim();
            if (!inputVal) return;

            const grid = document.getElementById('results-grid');
            const loading = document.getElementById('loading');
            const errorMsg = document.getElementById('error-message');

            // Resetear vistas
            grid.innerHTML = '';
            grid.classList.add('hidden');
            errorMsg.classList.add('hidden');
            loading.classList.remove('hidden');

            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(inputVal)}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Ocurrió un error al buscar');
                }

                if (data.results.length === 0) {
                    throw new Error('No se encontraron resultados que inicien con esa letra.');
                }

                data.results.forEach(anime => {
                    const card = document.createElement('a');
                    card.href = anime.url;
                    card.target = "_blank";
                    card.className = "card";

                    const score = anime.score !== "N/A" ? parseFloat(anime.score).toFixed(1) : "N/A";

                    card.innerHTML = `
                        <div class="card-img-wrapper">
                            <img src="${anime.image}" alt="${anime.title}" class="card-img" loading="lazy" onerror="this.src='https://via.placeholder.com/300x400/121212/ffffff?text=No+Image'">
                            <div class="card-score">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                                <span>${score}</span>
                            </div>
                        </div>
                        <div class="card-content">
                            <h3 class="card-title">${anime.title}</h3>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                grid.classList.remove('hidden');

            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
            }
        });
    </script>
</body>

</html>
